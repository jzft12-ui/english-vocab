<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>英文單字練習表</title>
    <style>
        body {
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
        }
        .form-container {
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        .form-row label {
            flex: 1 1 150px;
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }
        .form-row input {
            padding: 6px 8px;
            font-size: 14px;
            margin-top: 3px;
        }
        button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px 10px;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
        }
        .speak-btn, .delete-btn {
            padding: 4px 10px;
            cursor: pointer;
        }
        .delete-btn {
            background-color: #ff6666;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .delete-btn:hover {
            background-color: #cc0000;
        }
        .note {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>英文單字練習表</h1>

    <div class="form-container">
        <form id="wordForm">
            <div class="form-row">
                <label>
                    英文單字（必填）
                    <input type="text" id="wordInput" placeholder="例如：cat" required>
                </label>
                <label>
                    音標（自動填入，可視需要修改）
                    <input type="text" id="phoneticInput" placeholder="會自動帶入 /kæt/">
                </label>
                <label>
                    中文翻譯（自動填入，可視需要修改）
                    <input type="text" id="meaningInput" placeholder="會自動帶入：貓">
                </label>
            </div>
            <button type="submit">新增到表格</button>
            <span class="note">
                只要輸入「英文單字」→ 按 Enter 或「新增到表格」，會先自動查音標＋中文，再一起加入下方表格。
            </span>
        </form>
    </div>

    <table id="wordTable">
        <thead>
            <tr>
                <th>英文單字</th>
                <th>音標</th>
                <th>中文翻譯</th>
                <th>發音</th>
                <th>刪除</th>
            </tr>
        </thead>
        <tbody id="wordTableBody">
        </tbody>
    </table>

    <script>
        // ---------------- 基本資料儲存 ----------------
        let words = [];
        const STORAGE_KEY = "vocabList";

        const wordForm = document.getElementById("wordForm");
        const wordInput = document.getElementById("wordInput");
        const phoneticInput = document.getElementById("phoneticInput");
        const meaningInput = document.getElementById("meaningInput");
        const wordTableBody = document.getElementById("wordTableBody");

        // 內建簡單字典：英文 → 中文
        const BUILTIN_ZH_DICT = {
            "cat": "貓",
            "dog": "狗",
            "apple": "蘋果",
            "book": "書",
            "boy": "男孩",
            "girl": "女孩",
            "teacher": "老師",
            "student": "學生",
            "school": "學校",
            "table": "桌子",
            "chair": "椅子",
            "computer": "電腦",
            "phone": "手機",
            "tilde": "波浪號"
        };

        function loadFromStorage() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) {
                    words = JSON.parse(data);
                } else {
                    words = [
                        { word: "cat", phonetic: "/kæt/", meaning: "貓" },
                        { word: "dog", phonetic: "/dɔːɡ/", meaning: "狗" }
                    ];
                }
            } catch (e) {
                console.error("讀取 localStorage 失敗", e);
                words = [];
            }
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
        }

        // ---------------- 發音與刪除 ----------------
        function speakWord(word) {
            if (!("speechSynthesis" in window)) {
                alert("此瀏覽器不支援語音朗讀。");
                return;
            }
            if (!word) return;

            const utter = new SpeechSynthesisUtterance(word);
            utter.lang = "en-US";
            window.speechSynthesis.speak(utter);
        }

        function deleteWord(index) {
            words.splice(index, 1);
            saveToStorage();
            renderTable();
        }

        function renderTable() {
            wordTableBody.innerHTML = "";
            words.forEach((item, index) => {
                const tr = document.createElement("tr");
                tr.innerHTML =
                    "<td>" + (item.word || "") + "</td>" +
                    "<td>" + (item.phonetic || "") + "</td>" +
                    "<td>" + (item.meaning || "") + "</td>" +
                    "<td><button type='button' class='speak-btn' data-word='" + item.word + "'>🔊 發音</button></td>" +
                    "<td><button type='button' class='delete-btn' data-index='" + index + "'>刪除</button></td>";
                wordTableBody.appendChild(tr);
            });
        }

        wordTableBody.addEventListener("click", function (event) {
            const target = event.target;
            if (target.classList.contains("speak-btn")) {
                const w = target.getAttribute("data-word");
                speakWord(w);
            }
            if (target.classList.contains("delete-btn")) {
                const idx = parseInt(target.getAttribute("data-index"), 10);
                deleteWord(idx);
            }
        });

        // ---------------- 自動查音標＋中文 ----------------
        async function fetchPhonetic(wordLower) {
            try {
                const url = "https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(wordLower);
                const res = await fetch(url);
                if (!res.ok) {
                    return "";
                }
                const data = await res.json();
                let phoneticText = "";

                if (Array.isArray(data) && data.length > 0) {
                    const entry = data[0];
                    if (entry.phonetics && entry.phonetics.length > 0) {
                        const targetPhon = entry.phonetics.find(function (p) { return p.text; }) || entry.phonetics[0];
                        if (targetPhon && targetPhon.text) {
                            phoneticText = targetPhon.text;
                        }
                    } else if (entry.phonetic) {
                        phoneticText = entry.phonetic;
                    }
                }
                return phoneticText;
            } catch (e) {
                console.error("連線錯誤，無法查詢音標", e);
                return "";
            }
        }

        async function autoLookup(word) {
            const lower = word.toLowerCase();

            // 先清掉顯示欄位，避免舊資料殘留
            phoneticInput.value = "";
            meaningInput.value = "";
            phoneticInput.placeholder = "查詢中...";
            meaningInput.placeholder = "查詢中...";

            const phoneticFromApi = await fetchPhonetic(lower);

            let phonetic = phoneticFromApi;
            let meaning = "";

            if (BUILTIN_ZH_DICT.hasOwnProperty(lower)) {
                meaning = BUILTIN_ZH_DICT[lower];
            }

            // 將查到的內容顯示在上方欄位，方便你確認／修改
            if (phonetic) {
                phoneticInput.value = phonetic;
            }
            if (meaning) {
                meaningInput.value = meaning;
            }

            // 還原 placeholder
            phoneticInput.placeholder = "會自動帶入 /kæt/";
            meaningInput.placeholder = "會自動帶入：貓";

            // 讓呼叫者知道查到什麼
            return {
                phonetic: phonetic,
                meaning: meaning
            };
        }

        // ---------------- 表單送出流程 ----------------
        wordForm.addEventListener("submit", async function (event) {
            event.preventDefault();

            const wordRaw = wordInput.value.trim();
            if (!wordRaw) {
                alert("請先輸入英文單字。");
                return;
            }

            // 先做自動查詢
            const result = await autoLookup(wordRaw);
            let phonetic = result.phonetic;
            let meaning = result.meaning;

            // 如果老師有手動輸入／修改，以老師輸入為主
            if (phoneticInput.value.trim()) {
                phonetic = phoneticInput.value.trim();
            }
            if (meaningInput.value.trim()) {
                meaning = meaningInput.value.trim();
            }

            // 查不到任何資料時，提醒一次
            if (!phonetic && !meaning) {
                const confirmAdd = confirm("查不到「" + wordRaw + "」的音標或中文翻譯。\n\n是否仍然只存英文單字？");
                if (!confirmAdd) {
                    return;
                }
            }

            words.push({
                word: wordRaw,
                phonetic: phonetic,
                meaning: meaning
            });

            saveToStorage();
            renderTable();

            wordForm.reset();
            wordInput.focus();
        });

        // ---------------- 初始化 ----------------
        loadFromStorage();
        renderTable();
    </script>
</body>
</html>
